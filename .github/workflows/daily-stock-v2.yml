name: A股每日选股推荐（平衡型回测版）

on:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:

jobs:
  recommend:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install akshare numpy pandas requests

      - name: 配置 PushPlus Token
        run: echo "PUSHPLUS_TOKEN=${{ secrets.PUSHPLUS_TOKEN }}" >> $GITHUB_ENV

      - name: 运行选股脚本
        run: python stock_recommend.py   # 请替换为实际文件名

      - name: 上传推荐历史记录（可选）
        uses: actions/upload-artifact@v4
        with:
          name: recommendation-history
          path: recommend_history.csv
          retention-days: 7
