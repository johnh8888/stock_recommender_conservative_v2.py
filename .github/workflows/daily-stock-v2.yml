name: A股稳赚推荐

on:
  schedule:
    # 每天北京时间 10:30 执行，对应 UTC 2:30
    - cron: '30 2 * * *'
  workflow_dispatch:

jobs:
  recommend:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install akshare numpy pandas requests

      - name: 运行稳赢选股脚本
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          TEST_MODE: 0
        run: python stock_recommender_conservative_v2.py

      - name: 提交交易日志
        run: |
          if [ -f trade_log.csv ]; then
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git add trade_log.csv
            git commit -m "更新交易日志 $(TZ='Asia/Shanghai' date +'%Y%m%d')" || echo "无变更"
            git push
          else
            echo "暂无日志文件，跳过提交"
          fi