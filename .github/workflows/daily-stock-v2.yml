name: A股 AkShare 保守推荐

on:
  schedule:
    - cron: '30 7 * * 1-5'   # 北京时间15:30运行（给AkShare更多时间）
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: 安装依赖
        run: pip install akshare pandas requests
        
      - name: 运行 AkShare 脚本
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python stock_recommender_akshare.py
